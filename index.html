<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Number Guessing Game</title>
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light {
            background-color: #ffffff;
            color: #000000;
        }

        body.dark {
            background-color: #121212;
            color: #ffffff;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        #stopwatch {
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body class="light">

    <h1>Number Guessing Game</h1>

    <button id="modeToggle">Toggle Light/Dark Mode</button>

    <p id="date"></p>
    <p id="stopwatch">Round Time: 0.0 seconds</p>

    <h3>Level</h3>
    <input type="radio" name="level" id="e" value="3" checked>
    <label for="e">Easy</label>
    <input type="radio" name="level" id="m" value="10">
    <label for="m">Medium</label>
    <input type="radio" name="level" id="h" value="100">
    <label for="h">Hard</label>

    <br><br>
    <button id="playBtn">Play</button>

    <h3 id="msg">Select a Level</h3>
    <input type="text" id="guess">
    <button id="guessBtn" disabled>Guess</button>
    <button id="giveUpBtn" disabled>Give Up</button>
    <button id="resetBtn">Reset</button>

    <h3>Stats</h3>
    <p id="wins">Total wins: 0</p>
    <p id="avgScore">Average Score: --</p>
    <p id="fastest">Fastest Game: --</p>
    <p id="avgTime">Average Time: --</p>

    <h3>Leaderboard</h3>
    <ol>
        <li name="leaderboard">--</li>
        <li name="leaderboard">--</li>
        <li name="leaderboard">--</li>
    </ol>

    <canvas id="confettiCanvas"></canvas>

</body>
</html>
